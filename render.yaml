services:
  - type: web
    name: url-shortener-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    envVars:
      - key: PORT
        value: 8000
      - key: SECRET_KEY
        generateValue: true
      - key: API_KEY
        generateValue: true
      - key: DB_PATH
        value: urls.db
      - key: RATE_LIMIT
        value: 100 per hour
      - key: BASE_URL
        value: https://your-app.onrender.com
